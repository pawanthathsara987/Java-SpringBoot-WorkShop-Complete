<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 24px;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 24px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }

        input:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #111827;
        }

        .info-text {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Edit Restaurant</h1>

    <form th:action="@{/updateRestaurant/{id}(id=${restaurant.id})}" th:object="${restaurant}" method="post">
        <div class="field">
            <label for="id">ID</label>
            <input id="id" type="number" th:field="*{id}" disabled>
            <div class="info-text">Restaurant ID cannot be changed</div>
        </div>

        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}" required>
        </div>

        <div class="field">
            <label for="location">Location</label>
            <input id="location" type="text" th:field="*{location}" required>
        </div>

        <div class="field">
            <label for="cuisine">Cuisine</label>
            <input id="cuisine" type="text" th:field="*{cuisine}" required>
        </div>

        <div class="field">
            <label for="rating">Rating</label>
            <input id="rating" type="number" min="0" max="5" step="0.1" th:field="*{rating}" required>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit">Update Restaurant</button>
            <a class="btn btn-secondary" th:href="@{/}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
